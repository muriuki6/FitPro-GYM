<!-- Website Favicon SVG -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <style>
      .dumbbell { fill: #198754; }
      .circle { fill: #0d6efd; }
    </style>
  </defs>
  
  <!-- Background Circle -->
  <circle class="circle" cx="50" cy="50" r="48"/>
  
  <!-- Dumbbell Icon -->
  <g transform="translate(50, 50)">
    <!-- Left Weight -->
    <rect class="dumbbell" x="-35" y="-8" width="12" height="16" rx="2"/>
    <rect class="dumbbell" x="-35" y="-25" width="12" height="8" rx="1"/>
    
    <!-- Bar -->
    <rect class="dumbbell" x="-8" y="-3" width="16" height="6" rx="1" fill="#ffc107"/>
    
    <!-- Right Weight -->
    <rect class="dumbbell" x="23" y="-8" width="12" height="16" rx="2"/>
    <rect class="dumbbell" x="23" y="-25" width="12" height="8" rx="1"/>
  </g>
</svg>
